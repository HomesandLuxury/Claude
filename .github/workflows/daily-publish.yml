name: Daily Blog Publisher

on:
  schedule:
    # 10:00 AM PKT = 05:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run blog automation
        env:
          WP_SITE_URL:       ${{ secrets.WP_SITE_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          AMAZON_TAG:        ${{ secrets.AMAZON_TAG }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          TIMEZONE:          Asia/Karachi
          AUTO_REWRITE:      false
        run: node blog-automation.js --publish-now

      - name: Commit updated keyword index
        run: |
          git config user.name "HomesAndLuxury Bot"
          git config user.email "bot@homesandluxury.com"
          git add data/keyword_index.txt data/published_log.txt || true
          git diff --staged --quiet || git commit -m "chore: update keyword index after publish"
          git push || true
